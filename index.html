<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CS2 Map Veto</title>
<style>
:root{
  --bg:#0b0d10;
  --panel:#12161b;
  --line:#232a31;
  --text:#e8ecef;
  --dim:#8a94a0;
  --ct:#5b9cf6;
  --t:#e8a33d;
  --danger:#e0483e;
  --accent:#3ddc97;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:transparent;}
body{
  font-family:'Segoe UI',Arial,sans-serif;
  color:var(--text);
  min-height:100vh;
}
body.stage-bg{background:var(--bg);}
.wrap{max-width:960px;margin:0 auto;padding:24px;}

/* ---------- SETUP SCREEN ---------- */
.setup{
  max-width:640px;margin:40px auto;background:var(--panel);
  border:1px solid var(--line);border-radius:14px;padding:32px;
}
.setup h1{
  font-size:28px;margin:0 0 4px;letter-spacing:.5px;
}
.setup .sub{color:var(--dim);margin:0 0 28px;font-size:14px;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:13px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.field input[type=text]{
  width:100%;padding:12px 14px;background:#181d23;border:1px solid var(--line);
  border-radius:8px;color:var(--text);font-size:15px;
}
.field input[type=text]:focus{outline:2px solid var(--accent);border-color:var(--accent);}
.seg{display:flex;gap:8px;flex-wrap:wrap;}
.seg button{
  flex:1;min-width:140px;padding:14px 10px;background:#181d23;border:1px solid var(--line);
  border-radius:8px;color:var(--text);cursor:pointer;font-size:14px;font-weight:600;
  transition:border-color .15s, background .15s;
}
.seg button:hover{border-color:var(--accent);}
.seg button.active{background:rgba(61,220,151,.12);border-color:var(--accent);color:var(--accent);}
.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.seg .desc{width:100%;font-size:12px;color:var(--dim);margin-top:-6px;margin-bottom:16px;}
.pool-list{display:flex;flex-wrap:wrap;gap:8px;}
.pool-chip{
  padding:8px 14px;background:#181d23;border:1px solid var(--line);border-radius:20px;
  font-size:13px;cursor:pointer;color:var(--dim);
}
.pool-chip.on{color:var(--text);border-color:var(--accent);background:rgba(61,220,151,.1);}
.start-btn{
  width:100%;padding:16px;border:none;border-radius:10px;background:var(--accent);
  color:#04140c;font-weight:700;font-size:16px;cursor:pointer;margin-top:8px;
  letter-spacing:.3px;
}
.start-btn:disabled{opacity:.4;cursor:not-allowed;}
.start-btn:hover:not(:disabled){filter:brightness(1.08);}
.links-box{margin-top:24px;padding:16px;background:#181d23;border-radius:10px;border:1px solid var(--line);font-size:13px;}
.links-box div{margin-bottom:8px;word-break:break-all;color:var(--dim);}
.links-box b{color:var(--text);}
.copy-btn{
  background:none;border:1px solid var(--line);color:var(--accent);border-radius:6px;
  padding:4px 10px;font-size:12px;cursor:pointer;margin-left:6px;
}

/* ---------- STAGE (captain / admin / obs) ---------- */
.stage{max-width:1000px;margin:0 auto;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.team-title{font-size:22px;font-weight:800;}
.team-title.t1{color:var(--ct);}
.team-title.t2{color:var(--t);}
.vs{color:var(--dim);font-weight:400;font-size:16px;margin:0 10px;}
.turn-banner{
  text-align:center;padding:12px;border-radius:10px;margin-bottom:20px;font-size:15px;
  font-weight:700;letter-spacing:.3px;background:#181d23;border:1px solid var(--line);
}
.turn-banner.mine{border-color:var(--accent);color:var(--accent);background:rgba(61,220,151,.08);}
.turn-banner.theirs{color:var(--dim);}
.turn-banner.done{color:var(--accent);border-color:var(--accent);}

.maps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.map-card{
  position:relative;border-radius:10px;overflow:hidden;border:2px solid var(--line);
  aspect-ratio:16/10;cursor:pointer;background:#181d23;
}
.map-card img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.55);}
.map-card .name{
  position:absolute;bottom:0;left:0;right:0;padding:10px;font-weight:700;font-size:15px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
}
.map-card:not(.disabled):hover{border-color:var(--accent);}
.map-card:not(.disabled):hover img{filter:brightness(.7);}
.map-card.disabled{cursor:default;}
.map-card.banned{border-color:var(--danger);}
.map-card.banned img{filter:brightness(.25) grayscale(1);}
.map-card.picked{border-color:var(--accent);}
.map-card.picked img{filter:brightness(.8);}
.tag{
  position:absolute;top:8px;right:8px;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;
}
.tag.ban{background:var(--danger);color:#fff;}
.tag.pick{background:var(--accent);color:#04140c;}
.tag.byteam{position:absolute;top:8px;left:8px;font-size:10px;padding:3px 8px;border-radius:5px;font-weight:700;background:rgba(0,0,0,.55);}

.log{margin-top:24px;}
.log h3{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.log-row{
  display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);
  border:1px solid var(--line);border-radius:8px;margin-bottom:6px;font-size:14px;
}
.log-row .badge{
  font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;
}
.log-row .badge.ban{background:var(--danger);color:#fff;}
.log-row .badge.pick{background:var(--accent);color:#04140c;}
.log-row .who{color:var(--dim);font-size:12px;}

.admin-bar{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.admin-bar button{
  background:#181d23;border:1px solid var(--line);color:var(--dim);padding:8px 14px;
  border-radius:8px;font-size:12px;cursor:pointer;
}
.admin-bar button:hover{color:var(--danger);border-color:var(--danger);}

/* ---------- OBS OVERLAY ---------- */
.obs-wrap{padding:0;max-width:none;}
.obs-header{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 0;}
.obs-header .team-title{font-size:26px;text-shadow:0 2px 6px rgba(0,0,0,.6);}
.obs-strip{display:flex;gap:10px;padding:0 20px 20px;}
.obs-map{
  flex:1;position:relative;border-radius:8px;overflow:hidden;aspect-ratio:16/10;
  border:2px solid var(--line);background:#0d1013;
}
.obs-map img{width:100%;height:100%;object-fit:cover;display:block;}
.obs-map.banned img{filter:brightness(.25) grayscale(1);}
.obs-map.picked img{filter:brightness(.85);}
.obs-map.pending img{filter:brightness(.5);}
.obs-map .name{
  position:absolute;bottom:0;left:0;right:0;padding:8px;font-weight:800;font-size:13px;
  text-align:center;background:linear-gradient(transparent,rgba(0,0,0,.8));text-shadow:0 1px 3px #000;
}
.obs-map .tag{font-size:9px;padding:2px 7px;}
.obs-final-banner{
  text-align:center;padding:10px;color:var(--dim);font-size:13px;letter-spacing:.3px;
}
.hidden{display:none !important;}
.small-note{font-size:12px;color:var(--dim);margin-top:6px;}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
(function(){

// ---------- Map pool data ----------
const MAP_POOL_ACTIVE = [
  {id:"mirage",   name:"Mirage",    img:"https://static.wikia.nocookie.net/cswikia/images/9/9e/Cs2_mirage.png"},
  {id:"inferno",  name:"Inferno",   img:"https://static.wikia.nocookie.net/cswikia/images/6/6a/Cs2_inferno.png"},
  {id:"nuke",     name:"Nuke",      img:"https://static.wikia.nocookie.net/cswikia/images/4/4a/Cs2_nuke.png"},
  {id:"ancient",  name:"Ancient",   img:"https://static.wikia.nocookie.net/cswikia/images/2/2b/Cs2_ancient.png"},
  {id:"anubis",   name:"Anubis",    img:"https://static.wikia.nocookie.net/cswikia/images/7/7e/Cs2_anubis.png"},
  {id:"dust2",    name:"Dust II",   img:"https://static.wikia.nocookie.net/cswikia/images/9/94/Cs2_dust2.png"},
  {id:"train",    name:"Train",     img:"https://static.wikia.nocookie.net/cswikia/images/0/0c/Cs2_train.png"}
];

function fallbackImg(name){
  // simple colored placeholder generator (no network dependency)
  const colors = {mirage:"#c9a86a",inferno:"#c0523f",nuke:"#5f8f8f",ancient:"#5c7a4e",anubis:"#c9b45c",dust2:"#c9a35a",train:"#5c6b7a"};
  return null;
}

// ---------- Firebase setup ----------
// 1. Go to https://console.firebase.google.com -> Add project (free, no credit card).
// 2. In the project, open "Build" -> "Realtime Database" -> "Create Database" -> start in TEST MODE.
// 3. Go to Project settings (gear icon) -> General -> "Your apps" -> Web app (</>) -> register app.
// 4. Copy the firebaseConfig object it gives you and paste it below, replacing the placeholder.
const firebaseConfig = {
  apiKey: "AIzaSyBvvLgJ27RISZso_wS5fPZDJXJ48sxCPTs",
  authDomain: "map-veto-5f48f.firebaseapp.com",
  projectId: "map-veto-5f48f",
  storageBucket: "map-veto-5f48f.firebasestorage.app",
  messagingSenderId: "1085848048709",
  appId: "1:1085848048709:web:a33c5f44d7494604c33f2c",
  measurementId: "G-095414VLL6"
};
const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "AIzaSyBvvLgJ27RISZso_wS5fPZDJXJ48sxCPTs";

let dbRef = null;
if(FIREBASE_CONFIGURED && window.firebase){
  firebase.initializeApp(firebaseConfig);
}

// ---------- State helpers ----------
const params = new URLSearchParams(location.search);
const role = params.get('role'); // 'team1' | 'team2' | 'obs' | null(admin/setup)
const matchId = params.get('m') || 'default';

let state = null;

function getRef(){
  if(!dbRef){
    dbRef = firebase.database().ref('veto/' + matchId);
  }
  return dbRef;
}

async function loadState(){
  if(!FIREBASE_CONFIGURED) return null;
  try{
    const snap = await getRef().once('value');
    return snap.exists() ? snap.val() : null;
  }catch(e){ console.error(e); return null; }
}
async function saveState(s){
  if(!FIREBASE_CONFIGURED) return;
  try{
    await getRef().set(s);
  }catch(e){ console.error('save failed', e); }
}
async function deleteState(){
  if(!FIREBASE_CONFIGURED) return;
  try{ await getRef().remove(); }catch(e){}
}

const FORMATS = {
  bo1:{
    label:"BO1",
    sequence:["ban","ban","ban","ban","ban","ban","pick"], // last remaining map = decider auto-pick
    desc:"7 карт — 6 банов по очереди, последняя карта остаётся."
  },
  bo3:{
    label:"BO3",
    sequence:["ban","ban","pick","pick","ban","ban","pick"],
    desc:"Бан-бан-пик-пик-бан-бан, последняя — decider."
  },
  bo5:{
    label:"BO5",
    sequence:["ban","ban","pick","pick","pick","pick","ban","ban"],
    desc:"Бан-бан-пик-пик-пик-пик-бан-бан (для 8 карт), для 7 карт последний бан пропускается автоматически."
  }
};

function seqForFormat(fmt, totalMaps){
  let seq = FORMATS[fmt].sequence.slice();
  // trim/adjust sequence length to available maps - 1 action per map, last map auto-decided
  while(seq.length > totalMaps - 1){ seq.pop(); }
  while(seq.length < totalMaps - 1){ seq.push(seq[seq.length%2===0?0:1] || "ban"); }
  return seq;
}

function render(){
  const app = document.getElementById('app');

  if(!FIREBASE_CONFIGURED && (role === 'team1' || role === 'team2' || role === 'obs')){
    app.innerHTML = `<div class="wrap"><div class="setup" style="text-align:center;">
      <h1>Сайт ещё не настроен</h1>
      <p class="sub">Администратор ещё не завершил настройку Firebase. Сообщите ему об этом и попробуйте позже.</p>
    </div></div>`;
    return;
  }

  if(!state && role !== null || (!state && !role)){
    // no match yet -> show setup (only reachable without role, or role present but no state -> show waiting)
  }

  if(!state && (role === 'team1' || role === 'team2' || role === 'obs')){
    app.innerHTML = `<div class="wrap"><div class="setup" style="text-align:center;">
      <h1>Ожидание</h1>
      <p class="sub">Матч ещё не создан администратором. Обновите страницу через минуту.</p>
    </div></div>`;
    return;
  }

  if(!state){
    renderSetup();
    return;
  }

  if(role === 'obs'){ renderObs(); return; }
  if(role === 'team1' || role === 'team2'){ renderCaptain(role); return; }
  renderAdmin();
}

// ---------- SETUP ----------
let setupData = {
  team1:"Команда 1", team2:"Команда 2",
  format:"bo3",
  pool: MAP_POOL_ACTIVE.map(m=>m.id)
};

function renderSetup(){
  document.body.classList.remove('stage-bg');
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="wrap">
    <div class="setup">
      <h1>Настройка Map Veto</h1>
      <p class="sub">Создайте матч и отправьте капитанам их персональные ссылки.</p>

      <div class="field">
        <label>Название команды 1</label>
        <input type="text" id="in-team1" value="${setupData.team1}">
      </div>
      <div class="field">
        <label>Название команды 2</label>
        <input type="text" id="in-team2" value="${setupData.team2}">
      </div>

      <div class="field">
        <label>Формат вето</label>
        <div class="seg" id="fmt-seg">
          <button data-fmt="bo1" class="${setupData.format==='bo1'?'active':''}">BO1</button>
          <button data-fmt="bo3" class="${setupData.format==='bo3'?'active':''}">BO3</button>
          <button data-fmt="bo5" class="${setupData.format==='bo5'?'active':''}">BO5</button>
        </div>
        <div class="desc" id="fmt-desc">${FORMATS[setupData.format].desc}</div>
      </div>

      <div class="field">
        <label>Карт-пул (кликните, чтобы включить/выключить)</label>
        <div class="pool-list" id="pool-list"></div>
      </div>

      <button class="start-btn" id="start-btn">Создать матч</button>

      <div id="links-box"></div>
    </div>
  </div>`;

  renderPoolChips();

  document.getElementById('in-team1').oninput = e=> setupData.team1 = e.target.value || "Команда 1";
  document.getElementById('in-team2').oninput = e=> setupData.team2 = e.target.value || "Команда 2";

  document.getElementById('fmt-seg').querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{
      setupData.format = b.dataset.fmt;
      document.getElementById('fmt-seg').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById('fmt-desc').textContent = FORMATS[setupData.format].desc;
    };
  });

  document.getElementById('start-btn').onclick = createMatch;
}

function renderPoolChips(){
  const box = document.getElementById('pool-list');
  box.innerHTML = '';
  MAP_POOL_ACTIVE.forEach(m=>{
    const chip = document.createElement('div');
    chip.className = 'pool-chip' + (setupData.pool.includes(m.id) ? ' on' : '');
    chip.textContent = m.name;
    chip.onclick = ()=>{
      if(setupData.pool.includes(m.id)){
        setupData.pool = setupData.pool.filter(x=>x!==m.id);
      } else {
        setupData.pool.push(m.id);
      }
      renderPoolChips();
    };
    box.appendChild(chip);
  });
}

async function createMatch(){
  if(!FIREBASE_CONFIGURED){
    alert('Firebase ещё не настроен. Откройте файл сайта и вставьте свой firebaseConfig (см. комментарий в начале скрипта).');
    return;
  }
  if(setupData.pool.length < 3){
    alert('Выберите минимум 3 карты в пуле.');
    return;
  }
  const startBtn = document.getElementById('start-btn');
  startBtn.disabled = true;
  startBtn.textContent = 'Создаём матч…';

  const maps = MAP_POOL_ACTIVE.filter(m=>setupData.pool.includes(m.id));
  const seq = seqForFormat(setupData.format, maps.length);
  const newState = {
    team1: setupData.team1,
    team2: setupData.team2,
    format: setupData.format,
    maps: maps,
    sequence: seq, // array of "ban"/"pick", actor alternates team1,team2,team1...
    actions: [], // {mapId, type, by}
    remaining: maps.map(m=>m.id),
    finished: false
  };
  await saveState(newState);
  state = newState;
  showLinks();
}

function showLinks(){
  const base = location.origin + location.pathname;
  const mParam = '&m=' + encodeURIComponent(matchId);
  const l1 = base + '?role=team1' + mParam;
  const l2 = base + '?role=team2' + mParam;
  const l3 = base + '?role=obs' + mParam;
  const box = document.getElementById('links-box');
  box.innerHTML = `
  <div class="links-box">
    <div><b>Капитан ${state.team1}:</b><br>${l1} <button class="copy-btn" onclick="navigator.clipboard.writeText('${l1}')">Копировать</button></div>
    <div><b>Капитан ${state.team2}:</b><br>${l2} <button class="copy-btn" onclick="navigator.clipboard.writeText('${l2}')">Копировать</button></div>
    <div><b>OBS оверлей (Browser Source):</b><br>${l3} <button class="copy-btn" onclick="navigator.clipboard.writeText('${l3}')">Копировать</button></div>
    <div class="small-note">Матч создан. Отправьте капитанам их ссылки, а ссылку OBS добавьте в OBS как Browser Source.</div>
  </div>`;
}

// ---------- Turn logic ----------
function currentActionIndex(){ return state.actions.length; }
function isFinished(){ return currentActionIndex() >= state.sequence.length || state.remaining.length <= 1; }
function actingTeam(){
  // team1 acts on even index (0,2,4...), team2 on odd
  return currentActionIndex() % 2 === 0 ? 'team1' : 'team2';
}
function currentActionType(){
  const i = currentActionIndex();
  return state.sequence[i] || 'pick';
}

async function performAction(mapId){
  if(isFinished()) return;
  const type = currentActionType();
  const by = actingTeam();
  state.actions.push({mapId, type, by});
  state.remaining = state.remaining.filter(id=>id!==mapId);
  if(state.remaining.length === 1 && currentActionIndex() >= state.sequence.length){
    state.actions.push({mapId: state.remaining[0], type:'decider', by:'auto'});
  }
  if(isFinished()) state.finished = true;
  await saveState(state);
  render();
}

function mapStatus(mapId){
  const act = state.actions.find(a=>a.mapId===mapId);
  return act || null;
}

// ---------- CAPTAIN VIEW ----------
function renderCaptain(myRole){
  document.body.classList.add('stage-bg');
  const app = document.getElementById('app');
  const myTeamName = myRole==='team1' ? state.team1 : state.team2;
  const otherTeamName = myRole==='team1' ? state.team2 : state.team1;
  const myTurn = !isFinished() && actingTeam() === myRole;

  let banner;
  if(state.finished){
    banner = `<div class="turn-banner done">Вето завершено</div>`;
  } else if(myTurn){
    banner = `<div class="turn-banner mine">Ваш ход: ${currentActionType()==='ban' ? 'забаньте карту' : 'выберите карту'}</div>`;
  } else {
    banner = `<div class="turn-banner theirs">Ход соперника (${otherTeamName})…</div>`;
  }

  app.innerHTML = `
  <div class="stage">
    <div class="header">
      <div class="team-title ${myRole==='team1'?'t1':'t2'}">${myTeamName}</div>
      <div class="vs">vs</div>
      <div class="team-title ${myRole==='team1'?'t2':'t1'}" style="opacity:.6">${otherTeamName}</div>
    </div>
    ${banner}
    <div class="maps-grid" id="grid"></div>
    <div class="log" id="log"></div>
  </div>`;

  const grid = document.getElementById('grid');
  state.maps.forEach(m=>{
    const st = mapStatus(m.id);
    const disabled = !!st || !myTurn || state.finished;
    const card = document.createElement('div');
    card.className = 'map-card' + (st ? (st.type==='ban'?' banned':' picked') : '') + (disabled && !st ? ' disabled':'');
    card.innerHTML = `
      <img src="${m.img}" alt="${m.name}" onerror="this.style.opacity=0.15">
      ${st ? `<div class="tag ${st.type==='ban'?'ban':'pick'}">${st.type==='ban'?'Бан':(st.type==='decider'?'Decider':'Пик')}</div>` : ''}
      <div class="name">${m.name}</div>`;
    if(!disabled){
      card.onclick = ()=> performAction(m.id);
    }
    grid.appendChild(card);
  });

  renderLog();
}

function renderLog(){
  const log = document.getElementById('log');
  if(!log) return;
  if(state.actions.length === 0){ log.innerHTML = ''; return; }
  log.innerHTML = `<h3>История</h3>` + state.actions.map(a=>{
    const map = state.maps.find(m=>m.id===a.mapId);
    const teamName = a.by==='team1' ? state.team1 : (a.by==='team2' ? state.team2 : 'Авто');
    const badge = a.type==='ban' ? 'ban' : 'pick';
    const label = a.type==='ban' ? 'Бан' : (a.type==='decider'?'Decider':'Пик');
    return `<div class="log-row"><span class="badge ${badge}">${label}</span> ${map ? map.name : a.mapId} <span class="who">— ${teamName}</span></div>`;
  }).join('');
}

// ---------- ADMIN VIEW (fallback, no role param but state exists) ----------
function renderAdmin(){
  document.body.classList.add('stage-bg');
  const app = document.getElementById('app');
  const myTurn = !isFinished();
  let banner = state.finished
    ? `<div class="turn-banner done">Вето завершено</div>`
    : `<div class="turn-banner">Сейчас ходит: ${actingTeam()==='team1'?state.team1:state.team2} — ${currentActionType()==='ban'?'бан':'пик'}</div>`;

  app.innerHTML = `
  <div class="stage">
    <div class="header">
      <div class="team-title t1">${state.team1}</div>
      <div class="vs">vs</div>
      <div class="team-title t2">${state.team2}</div>
    </div>
    ${banner}
    <div class="maps-grid" id="grid"></div>
    <div class="log" id="log"></div>
    <div class="admin-bar"><button id="reset-btn">Сбросить матч</button></div>
    <div id="links-box"></div>
  </div>`;

  const grid = document.getElementById('grid');
  state.maps.forEach(m=>{
    const st = mapStatus(m.id);
    const card = document.createElement('div');
    card.className = 'map-card disabled' + (st ? (st.type==='ban'?' banned':' picked') : '');
    card.innerHTML = `
      <img src="${m.img}" alt="${m.name}" onerror="this.style.opacity=0.15">
      ${st ? `<div class="tag ${st.type==='ban'?'ban':'pick'}">${st.type==='ban'?'Бан':(st.type==='decider'?'Decider':'Пик')}</div>` : ''}
      <div class="name">${m.name}</div>`;
    grid.appendChild(card);
  });

  renderLog();
  showLinks();

  document.getElementById('reset-btn').onclick = async ()=>{
    if(confirm('Точно сбросить текущий матч и создать новый?')){
      await deleteState();
      state = null;
      render();
    }
  };
}

// ---------- OBS OVERLAY ----------
function renderObs(){
  document.body.classList.remove('stage-bg'); // transparent bg for OBS
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="wrap obs-wrap">
    <div class="obs-header">
      <div class="team-title t1">${state.team1}</div>
      <div class="vs">vs</div>
      <div class="team-title t2">${state.team2}</div>
    </div>
    <div class="obs-strip" id="obs-strip"></div>
    <div class="obs-final-banner" id="obs-banner"></div>
  </div>`;

  const strip = document.getElementById('obs-strip');
  state.maps.forEach(m=>{
    const st = mapStatus(m.id);
    const div = document.createElement('div');
    div.className = 'obs-map' + (st ? (st.type==='ban'?' banned':' picked') : ' pending');
    div.innerHTML = `
      <img src="${m.img}" alt="${m.name}" onerror="this.style.opacity=0.15">
      ${st ? `<div class="tag ${st.type==='ban'?'ban':'pick'}">${st.type==='ban'?'Бан':(st.type==='decider'?'Decider':'Пик')} · ${st.by==='team1'?state.team1:(st.by==='team2'?state.team2:'')}</div>` : ''}
      <div class="name">${m.name}</div>`;
    strip.appendChild(div);
  });

  const banner = document.getElementById('obs-banner');
  if(state.finished){
    banner.textContent = 'Вето завершено';
  } else {
    banner.textContent = `Ход: ${actingTeam()==='team1'?state.team1:state.team2} — ${currentActionType()==='ban'?'бан':'пик'}`;
  }
}

// ---------- Realtime updates ----------
function startListening(){
  if(!FIREBASE_CONFIGURED) return;
  getRef().on('value', (snap)=>{
    const fresh = snap.exists() ? snap.val() : null;
    if(JSON.stringify(fresh) !== JSON.stringify(state)){
      state = fresh;
      render();
    }
  });
}

(async function init(){
  if(!FIREBASE_CONFIGURED){
    render(); // will fall through to setup screen; createMatch() will alert the user
    return;
  }
  state = await loadState();
  render();
  startListening();
})();

})();
</script>
