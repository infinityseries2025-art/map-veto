<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Map Veto — CS2</title>
<link rel="icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&display=swap" rel="stylesheet">
<style>
/* =========================================================
   ТОКЕНЫ ДИЗАЙНА — та же палитра, что и на основном сайте
========================================================= */
:root{
  --color-primary:      #FFACBC;
  --color-primary-soft: rgba(255,172,188,0.10);
  --color-primary-line: rgba(255,172,188,0.24);
  --color-accent:       #FFACBC;
  --color-accent-deep:  #FF869C;
  --color-accent-glow:  rgba(255,172,188,0.35);
  --color-text:         #F6F2EC;
  --color-ink:          #1C1D21;
  --color-ink-soft:     #A8A398;
  --color-surface:      #212226;
  --color-surface-alt:  #292A30;

  --status-upcoming: #8CA0FF;
  --status-live:     #FF5C6C;
  --status-finished: #7A7669;
  --status-mine:     #3ddc97;

  --font-display: 'Raleway', sans-serif;
  --font-body: 'Raleway', sans-serif;

  --radius: 14px;
  --container: 880px;
  --container-wide: 1280px;

  --ban-color: #FF3B4E;
  --ban-glow: rgba(255,59,78,0.45);
  --pick-color: #34E19B;
  --pick-glow: rgba(52,225,155,0.45);

  --shadow-soft: 0 16px 40px rgba(0,0,0,0.45);
  --shadow-tight: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-glow: 0 0 0 1px rgba(255,172,188,0.18), 0 12px 30px rgba(255,172,188,0.12);

  --ease: cubic-bezier(.22,1,.36,1);
}

*,*::before,*::after{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  position:relative;
  margin:0;
  font-family:var(--font-body);
  color:var(--color-text);
  background-color:var(--color-ink);
  overflow-x:hidden;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body.stage-bg{
  background-image:
    radial-gradient(ellipse 60% 50% at 12% 18%, rgba(255,172,188,0.20), transparent 60%),
    radial-gradient(ellipse 55% 45% at 88% 12%, rgba(255,134,156,0.16), transparent 60%),
    radial-gradient(ellipse 65% 55% at 50% 100%, rgba(183,90,105,0.16), transparent 65%),
    linear-gradient(160deg, #1a1620 0%, #1C1D21 45%, #201a22 100%);
}
body.obs-mode{ background:transparent !important; }
::selection{ background:var(--color-accent); color:#1C1D21; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }

@keyframes fadeInUp{ from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
@keyframes popIn{ from{opacity:0;transform:translateY(14px) scale(.98);} to{opacity:1;transform:translateY(0) scale(1);} }
@keyframes dotPulse{ 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.55;transform:scale(1.35);} }
@keyframes pulseGlow{ 0%,100%{box-shadow:0 0 0 0 rgba(255,172,188,.35);} 50%{box-shadow:0 0 0 10px rgba(255,172,188,0);} }
@keyframes spin{ from{transform:rotate(0);} to{transform:rotate(360deg);} }

.wrap{ max-width:var(--container); margin:0 auto; padding:24px; }

/* ---------- header (мини-навбар) ---------- */
.top-header{
  display:flex; align-items:center; gap:12px;
  padding:18px 24px;
  border-bottom:1px solid var(--color-primary-line);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  background:rgba(28,29,33,0.78);
  max-width:var(--container); margin:0 auto;
}
.top-header .brand-mark{
  width:38px; height:38px; border-radius:50%;
  background:var(--color-surface); border:2px solid var(--color-primary);
  display:flex; align-items:center; justify-content:center; overflow:hidden; flex:none;
  box-shadow:var(--shadow-tight);
}
.top-header .brand-mark img{ width:78%; height:78%; object-fit:contain; }
.top-header .brand-text{ display:flex; flex-direction:column; line-height:1.2; }
.top-header .brand-text b{ font-family:var(--font-display); font-weight:900; font-size:16px; letter-spacing:.02em; }
.top-header .brand-text span{ font-size:11px; color:var(--color-ink-soft); text-transform:uppercase; letter-spacing:.1em; }
.obs-mode .top-header{ display:none; }
.top-header .is-link{
  margin-left:auto; display:inline-flex; align-items:center; gap:7px;
  padding:9px 16px; border-radius:999px; border:1px solid var(--color-primary-line);
  background:var(--color-primary-soft); color:var(--color-accent);
  font-size:12.5px; font-weight:700; letter-spacing:.02em; white-space:nowrap;
  transition:all .2s var(--ease);
}
.top-header .is-link:hover{ background:var(--color-accent); color:#1C1D21; border-color:var(--color-accent); transform:translateY(-1px); box-shadow:var(--shadow-glow); }
.top-header .is-link svg{ width:13px; height:13px; flex:none; }
@media (max-width:560px){ .top-header .is-link span{ display:none; } .top-header .is-link{ padding:9px 12px; } }

/* ---------- SETUP SCREEN ---------- */
.setup{
  max-width:620px; margin:44px auto; padding:34px;
  background:var(--color-surface); border:1px solid var(--color-primary-line);
  border-radius:20px; box-shadow:var(--shadow-soft);
  animation:popIn .5s var(--ease) both;
}
.setup .eyebrow{
  display:inline-block; font-size:12px; font-weight:700; letter-spacing:.14em;
  text-transform:uppercase; color:var(--color-accent); margin-bottom:8px;
}
.setup h1{ font-family:var(--font-display); font-size:26px; font-weight:800; margin:0 0 6px; color:var(--color-text); }
.setup .sub{ color:var(--color-ink-soft); margin:0 0 28px; font-size:14px; line-height:1.55; }

.field{ margin-bottom:20px; }
.field label{ display:block; font-size:12.5px; font-weight:700; color:var(--color-ink-soft); margin-bottom:8px; text-transform:uppercase; letter-spacing:.06em; }
.field input[type=text]{
  width:100%; padding:12px 14px; border-radius:10px;
  border:1px solid var(--color-primary-line); background:var(--color-surface-alt);
  color:var(--color-text); font-family:var(--font-body); font-size:15px;
  transition:border-color .2s ease, box-shadow .2s ease;
}
.field input[type=text]:focus{ outline:none; border-color:var(--color-primary); box-shadow:0 0 0 3px rgba(255,172,188,.16); }

.seg{ display:flex; gap:8px; flex-wrap:wrap; }
.seg button{
  flex:1; min-width:120px; padding:13px 10px; border-radius:10px;
  border:1px solid var(--color-primary-line); background:var(--color-surface-alt);
  color:var(--color-text); cursor:pointer; font-family:var(--font-body); font-weight:700; font-size:13.5px;
  transition:all .2s var(--ease);
}
.seg button:hover{ border-color:var(--color-primary); transform:translateY(-2px); }
.seg button.active{ background:var(--color-accent); border-color:var(--color-accent); color:#1C1D21; box-shadow:var(--shadow-glow); }
.seg .desc{ width:100%; font-size:12px; color:var(--color-ink-soft); margin-top:8px; }

.pool-list{ display:flex; flex-wrap:wrap; gap:8px; }
.pool-chip{
  padding:8px 15px; background:var(--color-surface-alt); border:1px solid var(--color-primary-line);
  border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; color:var(--color-ink-soft);
  transition:all .2s ease;
}
.pool-chip.on{ color:var(--color-text); border-color:var(--color-primary); background:var(--color-primary-soft); }
.pool-chip:hover{ border-color:var(--color-primary); }

.btn{
  position:relative; overflow:hidden; display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:14px 26px; border-radius:999px; background:var(--color-accent); color:#1C1D21;
  font-weight:700; font-size:14px; font-family:var(--font-body); border:none; cursor:pointer;
  box-shadow:var(--shadow-tight); transition:background .25s ease, transform .2s var(--ease), box-shadow .25s ease;
  width:100%; margin-top:6px;
}
.btn::after{
  content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.55), transparent);
  transform:skewX(-20deg); transition:left .5s ease;
}
.btn:hover{ background:var(--color-accent-deep); transform:translateY(-2px); box-shadow:var(--shadow-glow); }
.btn:hover::after{ left:130%; }
.btn:active{ transform:translateY(0) scale(.98); }
.btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
.btn.secondary{ background:var(--color-surface-alt); color:var(--color-accent-deep); border:1px solid var(--color-primary-line); width:auto; margin-top:0; padding:9px 16px; font-size:12.5px; }
.btn.secondary:hover{ background:var(--color-primary-soft); box-shadow:none; color:var(--color-accent); }
.btn.danger{ background:var(--color-surface-alt); color:var(--status-live); border:1px solid rgba(255,92,108,.35); width:auto; margin-top:0; padding:10px 18px; font-size:12.5px; }
.btn.danger:hover{ background:rgba(255,92,108,.12); box-shadow:none; }

.links-box{
  margin-top:24px; padding:18px; background:var(--color-surface-alt); border-radius:14px;
  border:1px dashed var(--color-primary-line); font-size:13px; animation:popIn .4s var(--ease) both;
}
.links-box .lb-row{ margin-bottom:12px; }
.links-box .lb-row:last-of-type{ margin-bottom:0; }
.links-box b{ color:var(--color-text); font-size:12.5px; text-transform:uppercase; letter-spacing:.04em; }
.links-box .lb-url{ display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
.links-box .lb-url span{ color:var(--color-ink-soft); word-break:break-all; font-size:12.5px; }
.small-note{ font-size:12px; color:var(--color-ink-soft); margin-top:14px; line-height:1.5; }

/* ---------- STAGE ---------- */
.stage{ max-width:820px; margin:0 auto; padding:32px 24px 60px; }
.header{ display:flex; justify-content:center; align-items:center; gap:14px; margin-bottom:20px; flex-wrap:wrap; text-align:center; }
.team-title{ font-family:var(--font-display); font-size:22px; font-weight:800; }
.team-title.t1{ color:#8CA0FF; }
.team-title.t2{ color:#FF869C; }
.vs{
  font-size:11px; font-weight:700; color:var(--color-accent);
  padding:3px 12px; border:1px solid var(--color-primary-line); border-radius:999px;
  text-transform:uppercase; letter-spacing:.08em;
}

.turn-banner{
  text-align:center; padding:13px; border-radius:12px; margin-bottom:22px; font-size:14.5px;
  font-weight:700; letter-spacing:.02em; background:var(--color-surface); border:1px solid var(--color-primary-line);
}
.turn-banner.mine{ border-color:var(--status-mine); color:var(--status-mine); background:rgba(61,220,151,.08); animation:pulseGlow 2s ease-in-out infinite; }
.turn-banner.act-ban{ border-color:var(--ban-color); color:var(--ban-color); background:rgba(255,59,78,.10); }
.turn-banner.act-pick{ border-color:var(--pick-color); color:var(--pick-color); background:rgba(52,225,155,.10); }
.turn-banner.theirs{ color:var(--color-ink-soft); }
.turn-banner.done{ color:var(--color-accent); border-color:var(--color-accent); background:var(--color-primary-soft); }

.maps-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:16px; }
.map-card{
  position:relative; border-radius:14px; overflow:hidden; border:2px solid var(--color-primary-line);
  aspect-ratio:16/10; cursor:pointer; background:var(--color-surface-alt);
  box-shadow:var(--shadow-tight); transition:transform .3s var(--ease), border-color .3s var(--ease), box-shadow .3s var(--ease);
}
.map-card img{ width:100%; height:100%; object-fit:cover; display:block; filter:brightness(.55); transition:filter .3s ease; }
.map-card .name{
  position:absolute; bottom:0; left:0; right:0; padding:11px 12px; font-weight:800; font-size:14.5px;
  font-family:var(--font-display); background:linear-gradient(transparent,rgba(0,0,0,.82)); letter-spacing:.01em;
}
.map-card:not(.disabled):hover{ border-color:var(--color-accent); transform:translateY(-4px); box-shadow:var(--shadow-glow); }
.map-card:not(.disabled):hover img{ filter:brightness(.72); }
.map-card.disabled{ cursor:default; }

/* --- BAN state: dark, red, crossed out --- */
.map-card.banned{ border-color:var(--ban-color); box-shadow:0 0 0 1px rgba(255,59,78,.28), 0 10px 26px rgba(255,59,78,.16); }
.map-card.banned img{ filter:brightness(.16) grayscale(1) contrast(1.1); }
.map-card.banned .name{ color:#c9c5bd; }
.map-card.banned::before, .map-card.banned::after{
  content:""; position:absolute; left:8%; right:8%; top:50%; height:4px; background:var(--ban-color);
  border-radius:4px; box-shadow:0 0 12px var(--ban-glow); z-index:2;
}
.map-card.banned::before{ transform:translateY(-50%) rotate(18deg); }
.map-card.banned::after{ transform:translateY(-50%) rotate(-18deg); }
.map-card.banned .cross-mark{ display:none; }

/* --- PICK state: bright, green, glowing --- */
.map-card.picked{ border-color:var(--pick-color); box-shadow:0 0 0 1px rgba(52,225,155,.35), 0 12px 30px rgba(52,225,155,.22); animation:pickPulse 1.8s ease-out 1; }
.map-card.picked img{ filter:brightness(.92) saturate(1.12); }
@keyframes pickPulse{ 0%{ box-shadow:0 0 0 0 rgba(52,225,155,.55);} 100%{ box-shadow:0 0 0 14px rgba(52,225,155,0);} }

.tag{
  position:absolute; top:8px; right:8px; padding:5px 12px; border-radius:7px; font-size:11.5px; font-weight:900;
  letter-spacing:.06em; text-transform:uppercase; display:flex; align-items:center; gap:5px; z-index:3;
  box-shadow:0 3px 10px rgba(0,0,0,.35);
}
.tag.ban{ background:var(--ban-color); color:#fff; }
.tag.ban::before{ content:"✕"; font-size:12px; font-weight:900; }
.tag.pick{ background:var(--pick-color); color:#06231a; }
.tag.pick::before{ content:"✓"; font-size:12px; font-weight:900; }
.tag.byteam{ position:absolute; top:8px; left:8px; font-size:10px; padding:3px 8px; border-radius:6px; font-weight:700; background:rgba(0,0,0,.55); }

.log{ margin-top:30px; }
.log h3{ font-family:var(--font-display); font-size:12px; color:var(--color-ink-soft); text-transform:uppercase; letter-spacing:.1em; margin-bottom:12px; font-weight:800; }
.log-row{
  display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--color-surface);
  border:1px solid var(--color-primary-line); border-radius:10px; margin-bottom:8px; font-size:13.5px;
  animation:fadeInUp .35s var(--ease) both;
}
.log-row .badge{ font-size:10px; font-weight:800; padding:3px 8px; border-radius:5px; text-transform:uppercase; letter-spacing:.03em; display:inline-flex; align-items:center; gap:4px; }
.log-row .badge.ban{ background:var(--ban-color); color:#fff; }
.log-row .badge.ban::before{ content:"✕"; }
.log-row .badge.pick{ background:var(--pick-color); color:#04140c; }
.log-row .badge.pick::before{ content:"✓"; }
.log-row .who{ color:var(--color-ink-soft); font-size:12px; margin-left:auto; }

.admin-bar{ display:flex; justify-content:flex-end; gap:10px; margin-top:24px; }

/* ---------- OBS OVERLAY (auto-centers to whatever Browser Source size you use; tuned for 1080p) ---------- */
.obs-mode .wrap{ max-width:none; }
.obs-wrap{
  width:100%; min-height:100vh; box-sizing:border-box;
  display:flex; align-items:center; justify-content:center; padding:40px;
}
.obs-panel{
  display:flex; flex-direction:column; align-items:center; gap:26px;
  background:rgba(12,12,16,.74); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,172,188,.25); border-radius:26px;
  padding:38px 50px 34px; box-shadow:0 34px 80px rgba(0,0,0,.6);
}
.obs-header{ display:flex; align-items:center; justify-content:center; gap:26px; }
.obs-header .team-title{
  font-size:44px; text-shadow:0 3px 14px rgba(0,0,0,.85); letter-spacing:.01em;
}
.obs-header .vs{ font-size:16px; padding:6px 20px; background:rgba(255,255,255,.08); }

.obs-strip{
  display:grid; grid-template-rows:repeat(2, minmax(0,1fr));
  grid-auto-flow:column; grid-auto-columns:280px;
  gap:24px; justify-content:center;
}
.obs-map{
  position:relative; border-radius:18px; overflow:hidden; width:280px; aspect-ratio:16/10;
  border:3px solid var(--color-primary-line); background:#101014;
  box-shadow:0 14px 34px rgba(0,0,0,.55);
  transition:border-color .3s ease, box-shadow .3s ease;
}
.obs-map img{ width:100%; height:100%; object-fit:cover; display:block; }

.obs-map.pending img{ filter:brightness(.55); }
.obs-map.pending{ border-color:var(--color-primary-line); }

.obs-map.banned{ border-color:var(--ban-color); box-shadow:0 0 0 3px rgba(255,59,78,.4), 0 14px 34px rgba(255,59,78,.32); }
.obs-map.banned img{ filter:brightness(.15) grayscale(1) contrast(1.1); }
.obs-map.banned::before, .obs-map.banned::after{
  content:""; position:absolute; left:6%; right:6%; top:50%; height:6px; background:var(--ban-color);
  border-radius:6px; box-shadow:0 0 18px var(--ban-glow); z-index:2;
}
.obs-map.banned::before{ transform:translateY(-50%) rotate(20deg); }
.obs-map.banned::after{ transform:translateY(-50%) rotate(-20deg); }

.obs-map.picked{ border-color:var(--pick-color); box-shadow:0 0 0 3px rgba(52,225,155,.45), 0 14px 34px rgba(52,225,155,.36); }
.obs-map.picked img{ filter:brightness(.96) saturate(1.15); }

.obs-map.newest{ animation:obsFlash 1.4s var(--ease) 1; }
@keyframes obsFlash{ 0%{ transform:scale(1.08); } 60%{ transform:scale(1.02); } 100%{ transform:scale(1); } }

.obs-map .name{
  position:absolute; bottom:0; left:0; right:0; padding:12px 10px 11px; font-weight:900; font-size:18px;
  font-family:var(--font-display); text-align:center; letter-spacing:.02em; text-transform:uppercase;
  background:linear-gradient(transparent,rgba(0,0,0,.92) 65%); text-shadow:0 2px 8px #000, 0 0 18px rgba(0,0,0,.6);
}
.obs-map .obs-tag{
  position:absolute; top:0; left:0; right:0; z-index:3;
  display:flex; flex-direction:column; align-items:center; gap:1px;
  padding:9px 8px 8px; border-radius:0;
  box-shadow:0 3px 12px rgba(0,0,0,.4);
}
.obs-map .obs-tag .action{ font-size:18px; font-weight:900; letter-spacing:.07em; text-transform:uppercase; line-height:1.1; display:flex; align-items:center; gap:6px; }
.obs-map .obs-tag .by{ font-size:12.5px; font-weight:800; letter-spacing:.03em; opacity:.92; line-height:1.2; }
.obs-map .obs-tag.ban{ background:linear-gradient(180deg, var(--ban-color), #C4172A); color:#fff; }
.obs-map .obs-tag.pick{ background:linear-gradient(180deg, var(--pick-color), #1FAE79); color:#052018; }
.obs-map .obs-tag .action .ic{ font-size:17px; }

.obs-final-banner{
  text-align:center; padding:15px 26px; color:var(--color-text); font-size:17px;
  letter-spacing:.05em; font-weight:800; font-family:var(--font-display);
  background:rgba(255,255,255,.06); border-radius:12px;
  border:1px solid var(--color-primary-line);
}

/* ---------- misc states ---------- */
.status-banner{
  display:flex; gap:14px; align-items:flex-start; padding:20px; border-radius:16px; margin:44px auto; max-width:520px;
  border:1px solid var(--color-primary-line); background:var(--color-surface); text-align:left;
}
.status-banner .ic{
  width:38px; height:38px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center;
  background:var(--color-primary-soft); font-size:18px;
}
.status-banner.pending .ic{ animation:spin 2.2s linear infinite; }
.status-banner h4{ margin:0 0 4px; font-size:15px; font-family:var(--font-display); }
.status-banner p{ margin:0; font-size:13.5px; color:var(--color-ink-soft); line-height:1.55; }

.hidden{ display:none !important; }

.footer-note{
  text-align:center; padding:24px; color:var(--color-ink-soft); font-size:12px; letter-spacing:.03em;
}
.footer-note b{ color:var(--color-accent); }

@media (max-width:560px){
  .top-header{ padding:14px 18px; }
  .stage{ padding:24px 16px 44px; }
}

@media (min-width:1300px){
  .top-header{ max-width:var(--container-wide); }
  .stage{ max-width:1180px; padding:48px 24px 70px; }
  .wrap{ max-width:var(--container-wide); }
  .maps-grid{ grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:20px; }
  .setup{ max-width:680px; }
}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
(function(){

// ---------- Map pool data ----------
const MAP_POOL_ACTIVE = [
  {id:"dust2",    name:"Dust II",   img:"https://upload.wikimedia.org/wikipedia/ru/6/6f/Dust_II_%28CS-GO%29.jpg"},
  {id:"mirage",   name:"Mirage",    img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3FHWZ_0x7s6Gzn1FGOZHP10_OFy3LUwgfKyyvIVZeiD93sUYVKmm6I7b-&s=10"},
  {id:"nuke",     name:"Nuke",      img:"https://static.wikia.nocookie.net/counterstrike/images/5/5e/Cs2nuke.jpg/revision/latest?cb=20230323193535&path-prefix=ru"},
  {id:"ancient",  name:"Ancient",   img:"https://game-rezone.com/wp-content/uploads/2024/09/de_ancient_cs2.webp"},
  {id:"inferno",  name:"Inferno",   img:"https://upload.wikimedia.org/wikipedia/ru/6/65/Inferno_%28CSGO%29.png"},
  {id:"anubis",   name:"Anubis",    img:"https://rus.egw.news/_next/image?url=https%3A%2F%2Fegw.news%2Fuploads%2Fnews%2F1691150500082-16x9.webp&w=1920&q=75"},
  {id:"cache",    name:"Cache",     img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmu7vUAg6iS3PK1U0ja4YyPX-Odn3Csv0Z1OFpUjHIBQt20TZ1-Rl_j8Zh&s=10"}
];

// ---------- Firebase (проект уже настроен, тариф Spark / бесплатный) ----------
const firebaseConfig = {
  apiKey: "AIzaSyBvvLgJ27RISZso_wS5fPZDJXJ48sxCPTs",
  authDomain: "map-veto-5f48f.firebaseapp.com",
  projectId: "map-veto-5f48f",
  storageBucket: "map-veto-5f48f.firebasestorage.app",
  messagingSenderId: "1085848048709",
  appId: "1:1085848048709:web:a33c5f44d7494604c33f2c",
  measurementId: "G-095414VLL6"
};
firebase.initializeApp(firebaseConfig);
// Firestore вместо Realtime Database — не требует отдельного databaseURL
// и укладывается в бесплатный лимит Spark-тарифа (50k чтений / 20k записей в день,
// более чем достаточно для матчей вето).
const db = firebase.firestore();

// ---------- State helpers ----------
const params = new URLSearchParams(location.search);
const role = params.get('role'); // 'team1' | 'team2' | 'obs' | null(admin/setup)
const matchId = (params.get('m') || 'default').replace(/[^a-zA-Z0-9_-]/g,'') || 'default';

let state = null;
let unsub = null;

function getDocRef(){
  return db.collection('vetoMatches').doc(matchId);
}
async function loadState(){
  try{
    const snap = await getDocRef().get();
    return snap.exists ? snap.data() : null;
  }catch(e){ console.error(e); return null; }
}
async function saveState(s){
  try{ await getDocRef().set(s); }catch(e){ console.error('save failed', e); alert('Не удалось сохранить: '+e.message); }
}
async function deleteState(){
  try{ await getDocRef().delete(); }catch(e){}
}

const FORMATS = {
  bo1:{ label:"BO1", sequence:["ban","ban","ban","ban","ban","ban","pick"], desc:"7 карт — 6 банов по очереди, последняя карта остаётся." },
  bo3:{ label:"BO3", sequence:["ban","ban","pick","pick","ban","ban","pick"], desc:"Бан-бан-пик-пик-бан-бан, последняя — decider." },
  bo5:{ label:"BO5", sequence:["ban","ban","pick","pick","pick","pick","ban","ban"], desc:"Бан-бан-пик-пик-пик-пик-бан-бан, для 7 карт последний бан пропускается." }
};

function seqForFormat(fmt, totalMaps){
  let seq = FORMATS[fmt].sequence.slice();
  while(seq.length > totalMaps - 1){ seq.pop(); }
  while(seq.length < totalMaps - 1){ seq.push(seq[seq.length%2===0?0:1] || "ban"); }
  return seq;
}

function render(){
  const app = document.getElementById('app');
  document.body.classList.remove('obs-mode');

  if(!state && (role === 'team1' || role === 'team2' || role === 'obs')){
    if(role === 'obs') document.body.classList.add('obs-mode');
    document.body.classList.add('stage-bg');
    app.innerHTML = headerHtml() + `
      <div class="status-banner pending">
        <div class="ic">⏳</div>
        <div><h4>Ожидание</h4><p>Матч ещё не создан администратором. Обновите страницу через минуту.</p></div>
      </div>`;
    return;
  }

  if(!state){ renderSetup(); return; }

  if(role === 'obs'){ renderObs(); return; }
  if(role === 'team1' || role === 'team2'){ renderCaptain(role); return; }
  renderAdmin();
}

function headerHtml(){
  return `<div class="top-header">
    <div class="brand-mark"><img src="favicon.png" alt="logo"></div>
    <div class="brand-text"><b>MAP VETO</b><span>CS2 Tournament Tool</span></div>
    <a class="is-link" href="https://infinityseries2025-art.github.io/InfinitySite-/index.html" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M13 5l7 7-7 7M4 12h16"/></svg>
      <span>Infinity Series</span>
    </a>
  </div>`;
}

// ---------- SETUP ----------
let setupData = { team1:"Команда 1", team2:"Команда 2", format:"bo3", pool: MAP_POOL_ACTIVE.map(m=>m.id) };

function renderSetup(){
  document.body.classList.add('stage-bg');
  const app = document.getElementById('app');
  app.innerHTML = headerHtml() + `
  <div class="wrap">
    <div class="setup">
      <span class="eyebrow">Админ-панель</span>
      <h1>Настройка Map Veto</h1>
      <p class="sub">Создайте матч и отправьте капитанам их персональные ссылки.</p>

      <div class="field">
        <label>Название команды 1</label>
        <input type="text" id="in-team1" value="${escapeHtml(setupData.team1)}">
      </div>
      <div class="field">
        <label>Название команды 2</label>
        <input type="text" id="in-team2" value="${escapeHtml(setupData.team2)}">
      </div>

      <div class="field">
        <label>Формат вето</label>
        <div class="seg" id="fmt-seg">
          <button data-fmt="bo1" class="${setupData.format==='bo1'?'active':''}">BO1</button>
          <button data-fmt="bo3" class="${setupData.format==='bo3'?'active':''}">BO3</button>
          <button data-fmt="bo5" class="${setupData.format==='bo5'?'active':''}">BO5</button>
        </div>
        <div class="desc" id="fmt-desc">${FORMATS[setupData.format].desc}</div>
      </div>

      <div class="field">
        <label>Карт-пул (кликните, чтобы включить/выключить)</label>
        <div class="pool-list" id="pool-list"></div>
      </div>

      <button class="btn" id="start-btn">Создать матч</button>
      <div id="links-box"></div>
    </div>
  </div>` + footerNote();

  renderPoolChips();

  document.getElementById('in-team1').oninput = e=> setupData.team1 = e.target.value || "Команда 1";
  document.getElementById('in-team2').oninput = e=> setupData.team2 = e.target.value || "Команда 2";

  document.getElementById('fmt-seg').querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{
      setupData.format = b.dataset.fmt;
      document.getElementById('fmt-seg').querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById('fmt-desc').textContent = FORMATS[setupData.format].desc;
    };
  });

  document.getElementById('start-btn').onclick = createMatch;
}

function renderPoolChips(){
  const box = document.getElementById('pool-list');
  box.innerHTML = '';
  MAP_POOL_ACTIVE.forEach(m=>{
    const chip = document.createElement('div');
    chip.className = 'pool-chip' + (setupData.pool.includes(m.id) ? ' on' : '');
    chip.textContent = m.name;
    chip.onclick = ()=>{
      if(setupData.pool.includes(m.id)){ setupData.pool = setupData.pool.filter(x=>x!==m.id); }
      else{ setupData.pool.push(m.id); }
      renderPoolChips();
    };
    box.appendChild(chip);
  });
}

async function createMatch(){
  if(setupData.pool.length < 3){ alert('Выберите минимум 3 карты в пуле.'); return; }
  const startBtn = document.getElementById('start-btn');
  startBtn.disabled = true;
  startBtn.textContent = 'Создаём матч…';

  const maps = MAP_POOL_ACTIVE.filter(m=>setupData.pool.includes(m.id));
  const seq = seqForFormat(setupData.format, maps.length);
  const newState = {
    team1: setupData.team1, team2: setupData.team2, format: setupData.format,
    maps: maps, sequence: seq, actions: [], remaining: maps.map(m=>m.id), finished: false
  };
  await saveState(newState);
  state = newState;
  startBtn.textContent = 'Матч создан';
  showLinks();
  startListening();
}

function showLinks(){
  const base = location.origin + location.pathname;
  const mParam = '&m=' + encodeURIComponent(matchId);
  const l1 = base + '?role=team1' + mParam;
  const l2 = base + '?role=team2' + mParam;
  const l3 = base + '?role=obs' + mParam;
  const box = document.getElementById('links-box');
  box.innerHTML = `
  <div class="links-box">
    ${linkRow('Капитан ' + state.team1, l1)}
    ${linkRow('Капитан ' + state.team2, l2)}
    ${linkRow('OBS оверлей (Browser Source)', l3)}
    <div class="small-note">Матч создан. Отправьте капитанам их ссылки, а ссылку OBS добавьте в OBS как Browser Source.</div>
  </div>`;
}
function linkRow(label, url){
  return `<div class="lb-row"><b>${escapeHtml(label)}</b>
    <div class="lb-url"><span>${escapeHtml(url)}</span>
    <button class="btn secondary" onclick="navigator.clipboard.writeText('${url.replace(/'/g,"\\'")}');this.textContent='Скопировано ✓';setTimeout(()=>this.textContent='Копировать',1400)">Копировать</button></div></div>`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function footerNote(){ return `<div class="footer-note">Создано <b>Infinity Series</b> · Работает на Map Veto · Firestore realtime</div>`; }

// ---------- Turn logic ----------
function currentActionIndex(){ return state.actions.length; }
function isFinished(){ return currentActionIndex() >= state.sequence.length || state.remaining.length <= 1; }
function actingTeam(){ return currentActionIndex() % 2 === 0 ? 'team1' : 'team2'; }
function currentActionType(){ const i = currentActionIndex(); return state.sequence[i] || 'pick'; }

async function performAction(mapId){
  if(isFinished()) return;
  const type = currentActionType();
  const by = actingTeam();
  state.actions.push({mapId, type, by});
  state.remaining = state.remaining.filter(id=>id!==mapId);
  if(state.remaining.length === 1 && currentActionIndex() >= state.sequence.length){
    state.actions.push({mapId: state.remaining[0], type:'decider', by:'auto'});
  }
  if(isFinished()) state.finished = true;
  await saveState(state);
  render();
}

function mapStatus(mapId){ return state.actions.find(a=>a.mapId===mapId) || null; }

// ---------- CAPTAIN VIEW ----------
function renderCaptain(myRole){
  document.body.classList.add('stage-bg');
  const app = document.getElementById('app');
  const myTeamName = myRole==='team1' ? state.team1 : state.team2;
  const otherTeamName = myRole==='team1' ? state.team2 : state.team1;
  const myTurn = !isFinished() && actingTeam() === myRole;

  let banner;
  if(state.finished){ banner = `<div class="turn-banner done">🏆 Вето завершено</div>`; }
  else if(myTurn){
    const isBan = currentActionType()==='ban';
    banner = `<div class="turn-banner mine ${isBan?'act-ban':'act-pick'}">${isBan ? '✕ Ваш ход: забаньте карту' : '✓ Ваш ход: выберите карту'}</div>`;
  }
  else{ banner = `<div class="turn-banner theirs">Ход соперника (${escapeHtml(otherTeamName)})…</div>`; }

  app.innerHTML = headerHtml() + `
  <div class="stage">
    <div class="header">
      <div class="team-title ${myRole==='team1'?'t1':'t2'}">${escapeHtml(myTeamName)}</div>
      <div class="vs">VS</div>
      <div class="team-title ${myRole==='team1'?'t2':'t1'}" style="opacity:.55">${escapeHtml(otherTeamName)}</div>
    </div>
    ${banner}
    <div class="maps-grid" id="grid"></div>
    <div class="log" id="log"></div>
  </div>`;

  const grid = document.getElementById('grid');
  state.maps.forEach(m=>{
    const st = mapStatus(m.id);
    const disabled = !!st || !myTurn || state.finished;
    const card = document.createElement('div');
    card.className = 'map-card' + (st ? (st.type==='ban'?' banned':' picked') : '') + (disabled && !st ? ' disabled':'');
    card.innerHTML = `
      <img src="${m.img}" alt="${m.name}" onerror="this.style.opacity=0.15">
      ${st ? `<div class="tag ${st.type==='ban'?'ban':'pick'}">${st.type==='ban'?'Бан':(st.type==='decider'?'Decider':'Пик')}</div>` : ''}
      <div class="name">${m.name}</div>`;
    if(!disabled){ card.onclick = ()=> performAction(m.id); }
    grid.appendChild(card);
  });

  renderLog();
}

function renderLog(){
  const log = document.getElementById('log');
  if(!log) return;
  if(state.actions.length === 0){ log.innerHTML = ''; return; }
  log.innerHTML = `<h3>История</h3>` + state.actions.map(a=>{
    const map = state.maps.find(m=>m.id===a.mapId);
    const teamName = a.by==='team1' ? state.team1 : (a.by==='team2' ? state.team2 : 'Авто');
    const badge = a.type==='ban' ? 'ban' : 'pick';
    const label = a.type==='ban' ? 'Бан' : (a.type==='decider'?'Decider':'Пик');
    return `<div class="log-row"><span class="badge ${badge}">${label}</span> ${map ? map.name : a.mapId} <span class="who">${escapeHtml(teamName)}</span></div>`;
  }).join('');
}

// ---------- ADMIN VIEW ----------
function renderAdmin(){
  document.body.classList.add('stage-bg');
  const app = document.getElementById('app');
  const adminIsBan = currentActionType()==='ban';
  let banner = state.finished
    ? `<div class="turn-banner done">🏆 Вето завершено</div>`
    : `<div class="turn-banner ${adminIsBan?'act-ban':'act-pick'}">Сейчас ходит: ${escapeHtml(actingTeam()==='team1'?state.team1:state.team2)} — ${adminIsBan?'✕ бан':'✓ пик'}</div>`;

  app.innerHTML = headerHtml() + `
  <div class="stage">
    <div class="header">
      <div class="team-title t1">${escapeHtml(state.team1)}</div>
      <div class="vs">VS</div>
      <div class="team-title t2">${escapeHtml(state.team2)}</div>
    </div>
    ${banner}
    <div class="maps-grid" id="grid"></div>
    <div class="log" id="log"></div>
    <div class="admin-bar"><button class="btn danger" id="reset-btn">Сбросить матч</button></div>
    <div id="links-box"></div>
  </div>`;

  const grid = document.getElementById('grid');
  state.maps.forEach(m=>{
    const st = mapStatus(m.id);
    const card = document.createElement('div');
    card.className = 'map-card disabled' + (st ? (st.type==='ban'?' banned':' picked') : '');
    card.innerHTML = `
      <img src="${m.img}" alt="${m.name}" onerror="this.style.opacity=0.15">
      ${st ? `<div class="tag ${st.type==='ban'?'ban':'pick'}">${st.type==='ban'?'Бан':(st.type==='decider'?'Decider':'Пик')}</div>` : ''}
      <div class="name">${m.name}</div>`;
    grid.appendChild(card);
  });

  renderLog();
  showLinks();

  document.getElementById('reset-btn').onclick = async ()=>{
    if(confirm('Точно сбросить текущий матч и создать новый?')){
      if(unsub){ unsub(); unsub=null; }
      await deleteState();
      state = null;
      render();
    }
  };
}

// ---------- OBS OVERLAY ----------
function renderObs(){
  document.body.classList.add('obs-mode');
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="wrap obs-wrap"><div class="obs-panel">
    <div class="obs-header">
      <div class="team-title t1">${escapeHtml(state.team1)}</div>
      <div class="vs">VS</div>
      <div class="team-title t2">${escapeHtml(state.team2)}</div>
    </div>
    <div class="obs-strip" id="obs-strip"></div>
    <div class="obs-final-banner" id="obs-banner"></div>
  </div></div>`;

  const lastMapId = state.actions.length ? state.actions[state.actions.length-1].mapId : null;
  const strip = document.getElementById('obs-strip');
  state.maps.forEach(m=>{
    const st = mapStatus(m.id);
    const div = document.createElement('div');
    div.className = 'obs-map' + (st ? (st.type==='ban'?' banned':' picked') : ' pending') + (m.id===lastMapId ? ' newest' : '');
    div.innerHTML = `
      <img src="${m.img}" alt="${m.name}" onerror="this.style.opacity=0.15">
      ${st ? `<div class="obs-tag ${st.type==='ban'?'ban':'pick'}">
          <div class="action"><span class="ic">${st.type==='ban'?'✕':'✓'}</span>${st.type==='ban'?'Бан':(st.type==='decider'?'Decider':'Пик')}</div>
          <div class="by">${st.by==='team1'?escapeHtml(state.team1):(st.by==='team2'?escapeHtml(state.team2):'Авто')}</div>
        </div>` : ''}
      <div class="name">${m.name}</div>`;
    strip.appendChild(div);
  });

  const banner = document.getElementById('obs-banner');
  banner.textContent = state.finished
    ? '🏆 Вето завершено'
    : `Сейчас ходит ${actingTeam()==='team1'?state.team1:state.team2} — ${currentActionType()==='ban'?'БАН карты':'ПИК карты'}`;
}

// ---------- Realtime updates ----------
function startListening(){
  if(unsub) return;
  unsub = getDocRef().onSnapshot((snap)=>{
    const fresh = snap.exists ? snap.data() : null;
    if(JSON.stringify(fresh) !== JSON.stringify(state)){
      state = fresh;
      render();
    }
  }, (err)=>console.error('snapshot error', err));
}

(async function init(){
  state = await loadState();
  render();
  startListening();
})();

})();
</script>
</body>
